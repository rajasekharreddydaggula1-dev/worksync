<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark navy background -->
  <rect width="100" height="100" rx="20" ry="20" fill="#030B4F"/>

  <!-- Sync ring arc top-right -->
  <path
    d="M 72 28 A 30 30 0 0 1 82 50"
    fill="none"
    stroke="#2563EB"
    stroke-width="5.5"
    stroke-linecap="round"
  />
  <!-- Arrow on top arc -->
  <polygon points="72,28 65,21 80,19" fill="#2563EB"/>

  <!-- Sync ring arc bottom-left -->
  <path
    d="M 28 72 A 30 30 0 0 1 18 50"
    fill="none"
    stroke="#2563EB"
    stroke-width="5.5"
    stroke-linecap="round"
  />
  <!-- Arrow on bottom arc -->
  <polygon points="28,72 35,79 20,81" fill="#2563EB"/>

  <!-- W lettermark in white -->
  <polyline
    points="28,34 38,66 50,47 62,66 72,34"
    fill="none"
    stroke="white"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
