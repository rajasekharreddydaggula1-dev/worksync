<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WorkSync Logo Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; font-family: 'Segoe UI', sans-serif; padding: 40px; color: #e2e8f0; }
    h1 { font-size: 1.4rem; margin-bottom: 32px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
    .section { margin-bottom: 48px; }
    .section h2 { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; letter-spacing: 0.08em; text-transform: uppercase; }
    .row { display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .item span { font-size: 0.72rem; color: #64748b; }

    /* On dark navy (as used in login page) */
    .on-navy { background: #030B4F; padding: 24px 32px; border-radius: 16px; display: flex; align-items: center; gap: 12px; }
    .on-navy h3 { color: white; font-size: 1.5rem; font-weight: 700; }

    /* On dark surface (as used in sidebar) */
    .on-surface { background: #1e293b; padding: 24px 32px; border-radius: 16px; display: flex; align-items: center; gap: 12px; }
    .on-surface h3 { color: white; font-size: 1.5rem; font-weight: 700; }

    /* On white */
    .on-white { background: white; padding: 24px 32px; border-radius: 16px; display: flex; align-items: center; gap: 12px; }
    .on-white h3 { color: #030B4F; font-size: 1.5rem; font-weight: 700; }
  </style>
</head>
<body>
  <h1>WorkSync Logo Preview</h1>

  <!-- logo.svg sizes -->
  <div class="section">
    <h2>logo.svg — All Sizes</h2>
    <div class="row">
      <div class="item">
        <img src="logo.svg" width="24" height="24" />
        <span>24px</span>
      </div>
      <div class="item">
        <img src="logo.svg" width="32" height="32" />
        <span>32px (sidebar)</span>
      </div>
      <div class="item">
        <img src="logo.svg" width="40" height="40" />
        <span>40px (login)</span>
      </div>
      <div class="item">
        <img src="logo.svg" width="64" height="64" />
        <span>64px</span>
      </div>
      <div class="item">
        <img src="logo.svg" width="100" height="100" />
        <span>100px</span>
      </div>
    </div>
  </div>

  <!-- logo2.svg sizes -->
  <div class="section">
    <h2>logo2.svg — All Sizes</h2>
    <div class="row">
      <div class="item">
        <img src="logo2.svg" width="24" height="24" />
        <span>24px</span>
      </div>
      <div class="item">
        <img src="logo2.svg" width="32" height="32" />
        <span>32px</span>
      </div>
      <div class="item">
        <img src="logo2.svg" width="40" height="40" />
        <span>40px</span>
      </div>
      <div class="item">
        <img src="logo2.svg" width="64" height="64" />
        <span>64px</span>
      </div>
      <div class="item">
        <img src="logo2.svg" width="100" height="100" />
        <span>100px</span>
      </div>
    </div>
  </div>

  <!-- In context -->
  <div class="section">
    <h2>In Context</h2>
    <div class="row">
      <div class="item">
        <div class="on-navy">
          <img src="logo2.svg" width="40" height="40" />
          <h3>WorkSync</h3>
        </div>
        <span>Login page (navy bg)</span>
      </div>
      <div class="item">
        <div class="on-surface">
          <img src="logo.svg" width="32" height="32" />
          <h3>WorkSync</h3>
        </div>
        <span>Sidebar (dark bg)</span>
      </div>
      <div class="item">
        <div class="on-white">
          <img src="logo2.svg" width="36" height="36" />
          <h3>WorkSync</h3>
        </div>
        <span>On white bg</span>
      </div>
    </div>
  </div>
</body>
</html>
